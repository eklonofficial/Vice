app-id: com.vice.Vice
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.python311

command: vice-app

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc

  # Audio (PipeWire/PulseAudio for desktop audio capture)
  - --socket=pulseaudio

  # Network — needed for the local HTTP share server
  - --share=network

  # Input devices — required for evdev global hotkeys
  - --device=input

  # Screen capture — via xdg-desktop-portal (Wayland) or direct (X11)
  - --device=dri

  # File access — user's clip save directory (defaults to ~/Videos/Vice)
  - --filesystem=xdg-videos
  - --filesystem=xdg-config/vice:create

  # Temp directory for the rolling segment buffer
  - --filesystem=/tmp/vice:create

  # xdg-desktop-portal for screen capture on Wayland
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.ScreenCast
  - --talk-name=org.freedesktop.portal.Screenshot

  # Allow running host binaries (gpu-screen-recorder, wf-recorder, ffmpeg)
  # Note: these need to be installed on the host system
  - --talk-name=org.freedesktop.Flatpak

build-options:
  append-path: /usr/lib/sdk/python311/bin
  env:
    PIP_PREFIX: /app
    PIP_DISABLE_PIP_VERSION_CHECK: '1'

modules:
  # System WebKit for the pywebview window
  - name: webkitgtk
    buildsystem: simple
    build-commands:
      - echo "WebKitGTK is provided by the freedesktop runtime"

  # Python dependencies via pip
  - name: python-deps
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app
          evdev
          aiohttp
          click
          tomli-w
          psutil
          pywebview
    sources:
      - type: file
        path: ../../requirements.txt
        dest-filename: requirements.txt

  # Vice itself
  - name: vice
    buildsystem: simple
    build-commands:
      # Install package
      - pip3 install --prefix=/app --no-deps .

      # Desktop entry (use reverse-domain ID for Flatpak)
      - install -Dm644 vice.desktop
            /app/share/applications/com.vice.Vice.desktop
      - sed -i 's/^Icon=vice/Icon=com.vice.Vice/'
            /app/share/applications/com.vice.Vice.desktop

      # Icons (multiple sizes for best compatibility)
      - install -Dm644 assets/vice.svg
            /app/share/icons/hicolor/scalable/apps/com.vice.Vice.svg

      # AppStream metadata
      - install -Dm644 packaging/flatpak/com.vice.Vice.metainfo.xml
            /app/share/metainfo/com.vice.Vice.metainfo.xml

    sources:
      - type: dir
        path: ../..

# appimage-builder recipe for Vice
# Docs: https://appimage-builder.readthedocs.io
#
# Requirements:
#   pip install appimage-builder
#   (run from the repo root)

version: 1

script:
  # Clean previous build
  - rm -rf AppDir || true

  # Install Vice + all Python deps into AppDir
  - python3 -m pip install --ignore-installed --prefix=/usr --root=AppDir
      evdev aiohttp click tomli-w psutil pywebview .

  # Copy desktop entry and icon
  - install -Dm644 vice.desktop AppDir/vice.desktop
  - install -Dm644 assets/vice.svg
        AppDir/usr/share/icons/hicolor/scalable/apps/vice.svg
  - install -Dm644 assets/vice.svg AppDir/vice.svg

AppDir:
  path: ./AppDir

  app_info:
    id: com.vice.Vice
    name: Vice
    icon: vice
    version: 0.1.0
    exec: usr/bin/vice-app
    exec_args: $@

  apt:
    arch: amd64
    sources:
      - sourceline: >-
          deb [arch=amd64]
          http://archive.ubuntu.com/ubuntu
          jammy main restricted universe multiverse

    include:
      # Python runtime
      - python3.10
      - python3-pip
      # pywebview GTK backend
      - python3-gi
      - python3-gi-cairo
      - gir1.2-gtk-3.0
      - gir1.2-webkit2-4.1
      - libgtk-3-0
      - libwebkit2gtk-4.1-0
      - libgirepository-1.0-1
      # Media tools (bundled so the AppImage is self-contained)
      - ffmpeg
      - libavcodec-extra
      # evdev
      - python3-evdev
    exclude:
      - humanity-icon-theme
      - hicolor-icon-theme
      - adwaita-icon-theme

  runtime:
    env:
      PYTHONPATH: >-
        $APPDIR/usr/lib/python3/dist-packages:$APPDIR/usr/local/lib/python3.10/dist-packages
      PYTHONHOME: $APPDIR/usr

  test:
    fedora-38:
      image: appimagecrafters/tests-env:fedora-38
      command: ./AppRun --version
    ubuntu-22.04:
      image: appimagecrafters/tests-env:ubuntu-22.04
      command: ./AppRun --version

AppImage:
  arch: x86_64
  file_name: Vice-0.1.0-x86_64.AppImage
  update-information: guess
  sign-key: none
  apt_arch: amd64
